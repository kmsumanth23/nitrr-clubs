name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck + lint + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Build needs these to evaluate the Supabase imports at build time.
          # In CI we use placeholder values — the actual queries don't run
          # during a static build, only at request time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-build-only
          NEXT_PUBLIC_SITE_URL: https://placeholder.vercel.app
        run: npm run build